<!DOCTYPE html>
<html>
<head>
<title>Bill</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* BILL CARD */
.bill-container {
    width:350px;
    background:white;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.1);
    overflow:hidden;
}

/* HEADER */
.bill-header {
    background:#4CAF50;
    color:white;
    padding:20px;
    text-align:center;
}

.bill-header h2 {
    margin:0;
}

/* CONTENT */
.bill-body {
    padding:20px;
}

.row {
    display:flex;
    justify-content:space-between;
    margin:10px 0;
    font-size:16px;
}

.total {
    font-size:20px;
    font-weight:bold;
    color:#2d3436;
}

/* FOOTER */
.bill-footer {
    text-align:center;
    padding:15px;
}

.btn {
    background:#4CAF50;
    color:white;
    padding:10px 20px;
    text-decoration:none;
    border-radius:6px;
}

</style>
</head>

<body>

<div class="bill-container">

    <!-- HEADER -->
    <div class="bill-header">
        <h2>🧾 Grocery Bill</h2>
        <p>Transaction Successful</p>
    </div>

    <!-- BODY -->
    <div class="bill-body">

        <div class="row">
            <span>Product:</span>
            <span>{{name}}</span>
        </div>

        <div class="row">
            <span>Price:</span>
            <span>₹{{price}}</span>
        </div>

        <div class="row">
            <span>Quantity:</span>
            <span>{{quantity}}</span>
        </div>

        <hr>

        <div class="row total">
            <span>Total:</span>
            <span>₹{{total}}</span>
        </div>

    </div>

    <!-- FOOTER -->
    <div class="bill-footer">
        <a href="/home" class="btn">Back to Home</a>
    </div>

</div>

</body>
</html>
